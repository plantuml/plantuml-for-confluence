<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PlantUML Renderer</title>
  <style>
    html, body {
      margin: 0;
      padding: 8px;
      background: #ffffff;
      color: #1f2328;
      font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    html.puml-dark, html.puml-dark body {
      background: #0d1117;
      color: #f0f6fc;
    }
    #plantuml-output svg {
      max-width: 100%;
      height: auto;
      display: block;
    }
    #plantuml-output {
      min-height: 40px;
    }
    /* Modal mode: let the SVG keep its intrinsic size and scroll the body
       in both axes if it overflows. Activated by renderer.js when the
       parent posts PLANTUML_SET_MODE with mode='modal'. We don't force
       width/height to 100% -- that would make Chromium reserve room for
       scrollbars even when they aren't needed. overflow:auto alone is
       enough: scrollbars appear iff the content actually overflows. */
    html.puml-modal, html.puml-modal body {
      overflow: auto;
    }
    html.puml-modal #plantuml-output svg {
      max-width: none;
      height: auto;
      width: auto;
    }
    .puml-error {
      color: #cf222e;
      background: #ffebe9;
      border: 1px solid #ffcecb;
      border-radius: 4px;
      padding: 8px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }
    .puml-loading {
      color: #656d76;
      font-style: italic;
    }
    /* ------------------------------------------------------------------
       Context menu shown on right-click over the rendered SVG.
       Positioned absolutely by renderer.js; styles only define look.
       Light and dark variants follow the same palette as the wrapper
       header in content.js (GitHub Primer colors).
       ------------------------------------------------------------------ */
    .puml-ctx-menu {
      position: fixed;
      z-index: 2147483647;
      min-width: 160px;
      margin: 0;
      padding: 4px 0;
      list-style: none;
      background: #ffffff;
      color: #1f2328;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(140, 149, 159, 0.2);
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
    }
    html.puml-dark .puml-ctx-menu {
      background: #161b22;
      color: #e6edf3;
      border-color: #30363d;
      box-shadow: 0 8px 24px rgba(1, 4, 9, 0.6);
    }
    .puml-ctx-menu li {
      padding: 6px 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .puml-ctx-menu li:hover {
      background: #ddf4ff;
      color: #0969da;
    }
    html.puml-dark .puml-ctx-menu li:hover {
      background: #1f6feb;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div id="plantuml-output">
    <div class="puml-loading">Loading PlantUML engine…</div>
  </div>
  <!-- viz-global.js must be loaded as a classic script (it sets globals). -->
  <script src="vendor/viz-global.js"></script>
  <!-- renderer.js is loaded as a module so it can import plantuml.js. -->
  <script type="module" src="renderer.js"></script>
</body>
</html>
